<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>진로 탐색 워크북 — 하고 싶은 일 하며 살고 싶은 사람들을 위한</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #faf9f7;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.08);
  --border-mid: rgba(0,0,0,0.13);
  --text-primary: #1a1a18;
  --text-secondary: #5a5a54;
  --text-tertiary: #9a9a90;
  --accent: #1D9E75;
  --accent-light: #E1F5EE;
  --accent-dark: #0F6E56;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141412;
    --surface: #1e1e1c;
    --border: rgba(255,255,255,0.08);
    --border-mid: rgba(255,255,255,0.14);
    --text-primary: #f0ede8;
    --text-secondary: #b0ada6;
    --text-tertiary: #6e6b65;
    --accent: #2DC98F;
    --accent-light: #0f2e22;
    --accent-dark: #5ee8b0;
  }
  .export-bar {
    background: rgba(20,20,18,0.92) !important;
  }
  .test-opt { background: #1e1e1c; color: var(--text-secondary); border-color: rgba(255,255,255,0.14); }
  .test-opt.selected { background: #2DC98F; border-color: #2DC98F; color: #141412; }
  .verb-chip { background: #1e1e1c; color: var(--text-secondary); border-color: rgba(255,255,255,0.14); }
  .verb-chip.selected { background: #2DC98F; border-color: #2DC98F; color: #141412; }
  .test-textarea, .direction-textarea, .num-input, .sv-related-input {
    color: var(--text-primary);
    background: #141412;
  }
  .modal { background: #1e1e1c; }
  .overall-card { background: #141412; }
  .tag.strong { background: #2DC98F; color: #141412; }
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', '맑은 고딕', sans-serif;
  font-weight: 300;
  line-height: 1.7;
  min-height: 100vh;
}

.page {
  max-width: 720px;
  margin: 0 auto;
  padding: 4rem 2rem 8rem;
  padding-top: calc(4rem + 48px);
}

/* Header */
.header {
  margin-bottom: 1rem;
  padding-bottom: 1rem;
  border-bottom: 0.5px solid var(--border-mid);
}
.header-eyebrow {
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  margin-bottom: 1rem;
}
.header-title {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(20px, 4vw, 26px);
  font-weight: 400;
  color: var(--text-primary);
  line-height: 1.3;
  margin-bottom: 0.75rem;
}
.header-sub {
  font-size: 14px;
  color: var(--text-secondary);
}

/* Section */
.section { margin-bottom: 4rem; }
.section-label {
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}
.section-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 20px;
  font-weight: 400;
  color: var(--text-primary);
  margin-bottom: 0.4rem;
}
.section-desc {
  font-size: 13px;
  color: var(--text-tertiary);
  margin-bottom: 1.5rem;
}

.divider {
  border: none;
  border-top: 0.5px solid var(--border);
  margin: 3rem 0;
}

/* Cards */
.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem 1.5rem;
  margin-bottom: 0.75rem;
}
.card-num { font-size: 11px; color: var(--text-tertiary); margin-bottom: 0.3rem; letter-spacing: 0.05em; }
.card-title { font-size: 15px; font-weight: 500; color: var(--text-primary); margin-bottom: 0.4rem; }
.card-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }

/* Timeline */
.timeline { display: flex; flex-direction: column; }
.tl-item { display: flex; gap: 1.25rem; }
.tl-left { display: flex; flex-direction: column; align-items: center; }
.tl-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); margin-top: 6px; flex-shrink: 0; }
.tl-line { width: 1px; flex: 1; background: var(--border); margin: 5px 0; }
.tl-content { padding-bottom: 1.75rem; flex: 1; }
.tl-period { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.05em; margin-bottom: 0.2rem; }
.tl-main { font-size: 15px; font-weight: 500; color: var(--text-primary); margin-bottom: 0.3rem; }
.tl-sub { font-size: 13px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 0.5rem; }
.tl-tag-wrap { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.4rem; min-height: 0; }
.tl-tag { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.6rem; background: var(--accent-light); border: 1px solid var(--accent); border-radius: 20px; font-size: 13px; color: var(--accent-dark); }
.tl-tag button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 13px; line-height: 1; padding: 0 0 0 2px; opacity: 0.7; }
.tl-tag button:hover { opacity: 1; }
